<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Synaptex - Future Plans</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Embedding the Anton font from Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Anton" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!--[if lt IE 9]>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->

    <style>
      /* Reset all margins and paddings */
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      /* Background */
      html {
          background: black;
      }

      /* Links */
      a {
          text-decoration: none !important;
      }

      /* Home button */
      .whyhome {
          background: none;
          outline: none;
          border-radius: 25px;
          border: solid 2px beige;
          color: beige;
          padding: 10px;
          transition: background 0.5s ease-in;
          position: fixed;
          top: 2vh;
          right: 2vw;
          z-index: 10;
      }

      .whyhome:hover {
          color: #000000;
          background: beige;
          translate: (10px);
      }

      /* Logo image */
      #fin {
          object-fit: contain;
          width: 70vw;
          height: auto;
          display: none;
          position: fixed;
          top: 10vh;
          left: 50%;
          transform: translateX(-50%);
          z-index: 5;
      }

      /* Preload Anton font */
      #fontPreload {
          font-family: 'Anton';
          visibility: hidden;
          position: absolute;
      }

      /* ----------------------------
         Canvas Animations
      -----------------------------*/
      canvas {
          position: fixed;
          opacity: 0;
          width: 80vw;      /* responsive width */
          height: auto;     /* auto height keeps aspect ratio */
          top: 50%;         
          left: 50%;        
          transform: translate(-50%, -50%); /* dynamically center */
          z-index: 1;
          animation: newspin 6s linear forwards;
      }

      /* Keyframes with exit motion */
      @keyframes newspin {
          0% {
              opacity: 0.2;
              transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
          }
          15% {
              opacity: 1;
              transform: translate(-50%, -50%) scale(1) rotate(1090deg);
          }
          90% {
              opacity: 1;
              transform: translate(-50%, -50%) scale(1) rotate(1090deg);
          }
          100% {
              opacity: 1;
              transform: translate(-50%, 500%) scale(1) rotate(1090deg); /* move off-screen */
          }
      }

      /* ----------------------------
         NewsLoader Styles - EXACT FROM ORIGINAL
      -----------------------------*/
      .loader-main {
          display: grid;
          place-items: center;
          height: 100vh;
          background: var(--bg, #e3e4e8);
          color: var(--fg, #000000);
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          z-index: 999;
      }

      :root {
          --bg: #e3e4e8;
          --fg: #000000;
      }

      .pl {
          position: relative;
          width: 12em;
          height: 12em;
          font-size: calc(16px + (24 - 16) * (100vw - 320px) / (1280 - 320));
      }

      .pl__dot {
          background: currentColor;
          position: absolute;
          top: calc(50% - 0.5em);
          left: calc(50% - 0.25em);
          width: 0.5em;
          height: 0.5em;
          transform-origin: 50% 100%;
          font-size: calc(16px + (24 - 16) * (100vw - 320px) / (1280 - 320));
      }

      /* Assign each dot animation */
      .pl__dot:nth-child(1) { animation: dot1 8s linear infinite; transform: rotate(0deg) translateY(-5.5em); }
      .pl__dot:nth-child(2) { animation: dot2 8s linear infinite; transform: rotate(30deg) translateY(-5.5em); }
      .pl__dot:nth-child(3) { animation: dot3 8s linear infinite; transform: rotate(60deg) translateY(-5.5em); }
      .pl__dot:nth-child(4) { animation: dot4 8s linear infinite; transform: rotate(90deg) translateY(-5.5em); }
      .pl__dot:nth-child(5) { animation: dot5 8s linear infinite; transform: rotate(120deg) translateY(-5.5em); }
      .pl__dot:nth-child(6) { animation: dot6 8s linear infinite; transform: rotate(150deg) translateY(-5.5em); }
      .pl__dot:nth-child(7) { animation: dot7 8s linear infinite; transform: rotate(180deg) translateY(-5.5em); }
      .pl__dot:nth-child(8) { animation: dot8 8s linear infinite; transform: rotate(210deg) translateY(-5.5em); }
      .pl__dot:nth-child(9) { animation: dot9 8s linear infinite; transform: rotate(240deg) translateY(-5.5em); }
      .pl__dot:nth-child(10) { animation: dot10 8s linear infinite; transform: rotate(270deg) translateY(-5.5em); }
      .pl__dot:nth-child(11) { animation: dot11 8s linear infinite; transform: rotate(300deg) translateY(-5.5em); }
      .pl__dot:nth-child(12) { animation: dot12 8s linear infinite; transform: rotate(330deg) translateY(-5.5em); }

      /* Dark theme override */
      @media (prefers-color-scheme: dark) {
          :root {
              --bg: #000000;
              --fg: #e3e4e8;
          }
      }

      /* Original keyframes preserved */
      @keyframes dot1 { 0%{transform:rotate(0deg) translateY(-5.5em);} 4.1667%{transform:rotate(30deg) translateY(0);} 50%{transform:rotate(360deg) translateY(0);} 95.8333%{transform:rotate(690deg) translateY(0);} 100%{transform:rotate(690deg) translateY(-5.5em);} }
      @keyframes dot2 { 0%,4.1667%{transform:rotate(30deg) translateY(-5.5em);} 8.3333%{transform:rotate(60deg) translateY(-0.5em);} 50%{transform:rotate(360deg) translateY(-0.5em);} 91.6667%{transform:rotate(660deg) translateY(-0.5em);} 95.8333%,100%{transform:rotate(660deg) translateY(-5.5em);} }
      @keyframes dot3 { 0%,8.3333%{transform:rotate(60deg) translateY(-5.5em);} 12.5%{transform:rotate(90deg) translateY(-1em);} 50%{transform:rotate(360deg) translateY(-1em);} 87.5%{transform:rotate(630deg) translateY(-1em);} 91.6667%,100%{transform:rotate(630deg) translateY(-5.5em);} }
      @keyframes dot4 { 0%,12.5%{transform:rotate(90deg) translateY(-5.5em);} 16.6667%{transform:rotate(120deg) translateY(-1.5em);} 50%{transform:rotate(360deg) translateY(-1.5em);} 83.3333%{transform:rotate(600deg) translateY(-1.5em);} 87.5%,100%{transform:rotate(600deg) translateY(-5.5em);} }
      @keyframes dot5 { 0%,16.6667%{transform:rotate(120deg) translateY(-5.5em);} 20.8333%{transform:rotate(150deg) translateY(-2em);} 50%{transform:rotate(360deg) translateY(-2em);} 79.1667%{transform:rotate(570deg) translateY(-2em);} 83.3333%,100%{transform:rotate(570deg) translateY(-5.5em);} }
      @keyframes dot6 { 0%,20.8333%{transform:rotate(150deg) translateY(-5.5em);} 25%{transform:rotate(180deg) translateY(-2.5em);} 50%{transform:rotate(360deg) translateY(-2.5em);} 75%{transform:rotate(540deg) translateY(-2.5em);} 79.1667%,100%{transform:rotate(540deg) translateY(-5.5em);} }
      @keyframes dot7 { 0%,25%{transform:rotate(180deg) translateY(-5.5em);} 29.1667%{transform:rotate(210deg) translateY(-3em);} 50%{transform:rotate(360deg) translateY(-3em);} 70.8333%{transform:rotate(510deg) translateY(-3em);} 75%,100%{transform:rotate(510deg) translateY(-5.5em);} }
      @keyframes dot8 { 0%,29.1667%{transform:rotate(210deg) translateY(-5.5em);} 33.3333%{transform:rotate(240deg) translateY(-3.5em);} 50%{transform:rotate(360deg) translateY(-3.5em);} 66.6667%{transform:rotate(480deg) translateY(-3.5em);} 70.8333%,100%{transform:rotate(480deg) translateY(-5.5em);} }
      @keyframes dot9 { 0%,33.3333%{transform:rotate(240deg) translateY(-5.5em);} 37.5%{transform:rotate(270deg) translateY(-4em);} 50%{transform:rotate(360deg) translateY(-4em);} 62.5%{transform:rotate(450deg) translateY(-4em);} 66.6667%,100%{transform:rotate(450deg) translateY(-5.5em);} }
      @keyframes dot10 { 0%,37.5%{transform:rotate(270deg) translateY(-5.5em);} 41.6667%{transform:rotate(300deg) translateY(-4.5em);} 50%{transform:rotate(360deg) translateY(-4.5em);} 58.3333%{transform:rotate(420deg) translateY(-4.5em);} 62.5%,100%{transform:rotate(420deg) translateY(-5.5em);} }
      @keyframes dot11 { 0%,41.6667%{transform:rotate(300deg) translateY(-5.5em);} 45.8333%{transform:rotate(330deg) translateY(-5em);} 50%{transform:rotate(360deg) translateY(-5em);} 54.1667%{transform:rotate(390deg) translateY(-5em);} 58.3333%,100%{transform:rotate(390deg) translateY(-5.5em);} }
      @keyframes dot12 { 0%,45.8333%{transform:rotate(330deg) translateY(-5.5em);} 50%{transform:rotate(360deg) translateY(-5.5em);} 54.1667%,100%{transform:rotate(360deg) translateY(-5.5em);} }

      /* ----------------------------
         Responsiveness
      -----------------------------*/
      @media (max-width: 600px) {
          canvas {
              width: 95vw;
          }
      }

      @media (min-width: 601px) and (max-width: 1200px) {
          canvas {
              width: 80vw;
          }
      }

      @media (min-width: 1201px) {
          canvas {
              width: 717px;
              height: 526px;
          }
      }
    </style>
  </head>

  <body>
    <img id="fin" src="https://synaptex.pages.dev/Home%20(3240%20x%201080%20px).png" alt="logo" loading="lazy" />
    <div id="fontPreload">.</div>
    <a href="/" class="whyhome"><i class="fa-solid fa-house"></i> HOME</a>

    <!-- Loader Container (hidden by default) -->
    <div id="loaderContainer" class="loader-main" style="display: none;">
      <div class="pl" id="loaderDots"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js" integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>
    
    <script>
      // ==========================================
      // FEATURE DETECTION
      // ==========================================
      (function () {
          $.support.canvas = 'getContext' in document.createElement('canvas');
          $.support.css3Animation = (function () {
              var sp = $('<span>');
              return (
                  sp.css("animation") !== undefined ||
                  sp.css("-webkit-animation") !== undefined ||
                  sp.css("-moz-animation") !== undefined
              );
          })();
      })();

      // ==========================================
      // NEWSLOADER FUNCTIONALITY
      // ==========================================
      function createNewsLoader() {
        const dotsContainer = document.getElementById('loaderDots');
        for (let i = 0; i < 12; i++) {
          const dot = document.createElement('div');
          dot.className = 'pl__dot';
          dotsContainer.appendChild(dot);
        }
      }

      function showLoader() {
        const loaderContainer = document.getElementById('loaderContainer');
        loaderContainer.style.display = 'grid';
      }

      function hideLoader() {
        const loaderContainer = document.getElementById('loaderContainer');
        loaderContainer.style.display = 'none';
      }

      // AboutusRedirect functionality - Check if loader was already shown
      function initializeAboutusRedirect() {
        const loaderShown = sessionStorage.getItem('newsLoaderShown');
        
        if (!loaderShown) {
          // Show loader
          createNewsLoader();
          showLoader();
          
          // Set timer for 4 seconds (2 + 2 extra seconds)
          const loaderTimer = setTimeout(() => {
              sessionStorage.setItem('newsLoaderShown', 'true');
              hideLoader();
              window.location.href = '/whatsnext.html';
          }, 4000);
        }
      }

      // ==========================================
      // CANVAS ANIMATION FUNCTIONALITY
      // ==========================================
      $(window).on("load", function () {
          var imgPath = "newsassets/img/";

          // Define 6 paper covers
          var papers = [
              { line1: "SYNAPTEX", line2: "turns to importing!", subtitle: "The new importer in town", centerImage: "paper_center.jpg" },
              { line1: "SYNAPTEX", line2: "making waves", subtitle: "Expanding to Eastern Europe", centerImage: "paper_center2.jpg" },
              { line1: "SYNAPTEX", line2: "now a Quality Controller", subtitle: "Best compliance standards in Europe", centerImage: "paper_center3.jpg" },
              { line1: "SYNAPTEX", line2: "Your Forwarding Experts", subtitle: "Consult to ship today!", centerImage: "paper_center4.jpg" },
              { line1: "SYNAPTEX", line2: "Takes on Insurance", subtitle: "Maritime, In-land, On-Road insurance suggestions", centerImage: "paper_center5.jpg" },
              { line1: "SYNAPTEX", line2: "enters warehousing", subtitle: "Flexible Warehousing made possible", centerImage: "paper_center6.jpg" }
          ];

          // Fallbacks for unsupported browsers
          if (!$.support.canvas) {
              $('#fin').html('Sorry, your browser does not support &lt;canvas&gt;').show();
              return;
          }

          if (!$.support.css3Animation) {
              $('#fin').html('Sorry, your browser does not support CSS3 Animations').show();
              return;
          }

          // Loop through papers and create canvas for each
          $.each(papers, function (i, paper) {
              $.when(
                  loadImage(imgPath + "paper_top.png"),
                  loadImage(imgPath + "paper_left.png"),
                  loadImage(imgPath + paper.centerImage),
                  loadImage(imgPath + "paper_right.png")
              ).then(function (imgTop, imgLeft, imgCenter, imgRight) {

                  var canvas = document.createElement("canvas"),
                      c = canvas.getContext("2d");

                  // Responsive scaling based on viewport
                  var scale = Math.min(window.innerWidth / 717, window.innerHeight / 526, 1);
                  canvas.width = 717 * scale;
                  canvas.height = 526 * scale;

                  c.drawImage(imgTop, 0, 0, canvas.width, canvas.height * 0.2);
                  c.drawImage(imgLeft, 0, canvas.height * 0.02, canvas.width * 0.02, canvas.height * 0.96);
                  c.drawImage(imgCenter, canvas.width * 0.02, canvas.height * 0.02, canvas.width * 0.96, canvas.height * 0.96);
                  c.drawImage(imgRight, canvas.width - canvas.width * 0.02, canvas.height * 0.02, canvas.width * 0.02, canvas.height * 0.96);

                  drawText(paper.line1, paper.line2, paper.subtitle, c, canvas.width / 2, canvas.height / 2, scale);

                  // Append with staggered delay - 5.8 seconds per paper (6 papers = ~35 seconds total)
                  setTimeout(function () {
                      $("body").append(canvas);
                      $(canvas).css('animation', 'newspin 6s linear forwards');
                  }, i * 5800);
              });
          });

          // Show final logo after all canvases - calculate total time accurately
          var totalCanvasTime = papers.length * 5800 + 6000; // Last canvas animation (6s) + buffer
          $('#fin').delay(totalCanvasTime).fadeIn();
      });

      // ==========================================
      // HELPER FUNCTIONS
      // ==========================================
      function loadImage(src) {
          var def = new $.Deferred(),
              img = new Image();
          img.onload = function () { def.resolve(img); };
          img.onerror = function () { def.reject("Failed to load image: " + src); };
          img.src = src;
          return def.promise();
      }

      function drawText(line1, line2, subtitle, c, x, y, scale) {
          c.font = `${65 * scale}px Anton, Calibri`;
          c.textAlign = "center";
          c.fillStyle = "#3e3e3e";
          c.fillText(line1.toUpperCase(), x, y - 20 * scale);
          c.fillText(line2.toUpperCase(), x, y + 50 * scale);

          c.font = `italic ${20 * scale}px Georgia, serif`;
          c.fillStyle = "#737373";
          c.fillText(subtitle, x, y + 100 * scale);
      }

      // Re-scale canvases on window resize
      $(window).on('resize', function () {
          $('canvas').each(function () {
              var scale = Math.min(window.innerWidth / 717, window.innerHeight / 526, 1);
              this.width = 717 * scale;
              this.height = 526 * scale;
              // NOTE: you might need to re-draw the content here if dynamic scaling is required
          });
      });

      // ==========================================
      // INITIALIZE ON PAGE LOAD
      // ==========================================
      document.addEventListener('DOMContentLoaded', function() {
          initializeAboutusRedirect();
      });
    </script>
  </body>
</html>
